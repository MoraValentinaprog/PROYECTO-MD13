{% extends 'core/base.html' %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-dark text-white text-center py-3">
                    <h4 class="mb-0 fw-bold">Ingresar al Blog</h4>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary w-100 mt-3 fw-bold py-2">Iniciar Sesión</button>
                    </form>
                    <div class="mt-4 text-center">
                        <p class="text-muted mb-0">¿Todavía no tenés una cuenta? <a href="{% url 'registro' %}" class="text-primary fw-bold text-decoration-none">Registrate acá</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
